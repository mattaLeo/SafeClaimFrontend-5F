<div class="w-full min-h-screen bg-[#EBF4F6] py-10 px-6">
  <div class="max-w-6xl mx-auto">

    <header class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-3xl font-black text-[#09637E] uppercase tracking-tight">
          I Miei <span class="text-[#088395]">Veicoli</span>
        </h1>
        <p class="text-slate-500 font-medium tracking-tight">Visualizzazione modulare del tuo parco auto</p>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="showNuovoVeicolo = true"
                class="bg-[#09637E] text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm hover:bg-[#088395] transition-all flex items-center gap-2">
          <i class="bi bi-plus-lg"></i>
          Nuovo Veicolo
        </button>

        <button (click)="tornaAllaDashboard()"
                class="group flex items-center gap-2 bg-white text-[#09637E] border border-[#7AB2B2]/30 px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-sm hover:bg-[#09637E] hover:text-white transition-all">
          <i class="bi bi-arrow-left text-lg group-hover:-translate-x-1 transition-transform"></i>
          Torna alla Dashboard
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <app-veicolo-item
        *ngFor="let v of veicoliService.veicoli"
        [veicolo]="v"
        (veicoloClick)="apriDettaglio($event)">
      </app-veicolo-item>
    </div>

    <div *ngIf="veicoliService.veicoli.length === 0"
         class="flex flex-col items-center justify-center p-20 bg-white/50 rounded-3xl border-2 border-dashed border-[#7AB2B2]/30 mt-6">
      <div class="bg-[#EBF4F6] w-16 h-16 rounded-full flex items-center justify-center mb-4 text-[#7AB2B2]">
        <i class="bi bi-car-front text-3xl"></i>
      </div>
      <h3 class="text-[#09637E] font-black uppercase text-sm tracking-widest">Nessun veicolo trovato</h3>
      <p class="text-slate-400 text-xs mt-1 font-medium">I dati verranno visualizzati non appena registrati nel database.</p>
    </div>

  </div>
</div>

<app-nuovo-veicolo
  *ngIf="showNuovoVeicolo"
  (created)="onVeicoloCreato()"
  (closed)="showNuovoVeicolo = false">
</app-nuovo-veicolo>

<app-dettagli-veicolo
  *ngIf="veicoloSelezionato"
  [veicolo]="veicoloSelezionato"
  (closed)="chiudiDettaglio()">
</app-dettagli-veicolo>
